name: Update Deploy to Azure Button

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite Deploy to Azure button URL
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          ENCODED_REPO=$(echo "$GH_REPO" | sed 's|/|%2F|g' )
          sed -i "s|REPO_PLACEHOLDER|${ENCODED_REPO}|g" README.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update Deploy to Azure button for ${{ github.repository }}" && git push)
